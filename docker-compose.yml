services:
  install:
    container_name: google-events-install
    image: node:20-alpine
    working_dir: /app
    environment:
      PNPM_HOME: /pnpm
      PATH: /pnpm:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    command: sh -c "corepack enable && CI=true pnpm install --no-frozen-lockfile --store-dir /pnpm/store"
    volumes:
      - .:/app
      - node_modules:/app/node_modules

  api:
    container_name: google-events-api
    image: node:20-alpine
    working_dir: /app
    environment:
      PNPM_HOME: /pnpm
      PATH: /pnpm:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    command: sh -c "corepack enable && pnpm run --filter=api prisma:generate && pnpm run --filter=api dev"
    ports:
      - "3001:3001"
    env_file:
      - ./apps/api/.env
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      install:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

  web:
    container_name: google-events-web
    image: node:20-alpine
    working_dir: /app
    environment:
      PNPM_HOME: /pnpm
      PATH: /pnpm:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    command: sh -c "corepack enable && pnpm run --filter=web dev"
    ports:
      - "3000:3000"
    env_file:
      - ./apps/web/.env
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      install:
        condition: service_completed_successfully

  postgres:
    container_name: google-events-postgres
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    env_file:
      - ./apps/api/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  node_modules:
  postgres_data:
