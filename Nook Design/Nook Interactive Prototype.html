document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

002Fsc-for>\n          <\u002Fdiv>\n\n          <div style=\"display:flex; gap:12px; margin-top:18px;\">\n            <div style=\"flex:1;\">\n              <label style=\"display:block; font-size:13px; font-weight:700; color:#6F665D; margin-bottom:7px;\">Start<\u002Flabel>\n              <input type=\"time\" value=\"{{ form.start }}\" onchange=\"{{ setStart }}\" style=\"width:100%; border:1.5px solid #EAE0D5; border-radius:13px; padding:12px 14px; font-family:'Figtree',sans-serif; font-size:15px; color:#2E2823; background:#FFFDFB;\" style-focus=\"{{ inputFocus }}\">\n            <\u002Fdiv>\n            <div style=\"flex:1;\">\n              <label style=\"display:block; font-size:13px; font-weight:700; color:#6F665D; margin-bottom:7px;\">End<\u002Flabel>\n              <input type=\"time\" value=\"{{ form.end }}\" onchange=\"{{ setEnd }}\" style=\"width:100%; border:1.5px solid #EAE0D5; border-radius:13px; padding:12px 14px; font-family:'Figtree',sans-serif; font-size:15px; color:#2E2823; background:#FFFDFB;\" style-focus=\"{{ inputFocus }}\">\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- conflict -->\n          <sc-if value=\"{{ showConflict }}\" hint-placeholder-val=\"\">\n            <div style=\"display:flex; gap:12px; background:#FBE9E6; border:1px solid #F2C9C2; border-radius:14px; padding:14px; margin-top:18px;\">\n              <span class=\"material-symbols-rounded\" style=\"font-size:22px; color:#D85C4E; flex-shrink:0;\">error<\u002Fspan>\n              <div>\n                <div style=\"font-weight:800; font-size:14.5px; color:#B23F33;\">Scheduling conflict<\u002Fdiv>\n                <div style=\"font-size:13.5px; color:#9C5249; margin-top:3px; line-height:1.5;\">Overlaps <strong>{{ conflictTitle }}<\u002Fstrong> ({{ conflictTime }}) {{ conflictSource }}. Pick another time to continue.<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- free -->\n          <sc-if value=\"{{ showFree }}\" hint-placeholder-val=\"\">\n            <div style=\"display:flex; gap:12px; background:#E7F1E9; border:1px solid #CDE5D3; border-radius:14px; padding:14px; margin-top:18px;\">\n              <span class=\"material-symbols-rounded\" style=\"font-size:22px; color:#4F9B6A; flex-shrink:0;\">verified<\u002Fspan>\n              <div>\n                <div style=\"font-weight:800; font-size:14.5px; color:#3F8157;\">This slot is free<\u002Fdiv>\n                <div style=\"font-size:13.5px; color:#5A8A6B; margin-top:3px; line-height:1.5;\">{{ freeSubtext }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n\n        <div style=\"display:flex; gap:10px; padding:20px 24px 24px; margin-top:6px;\">\n          <button onclick=\"{{ closeModal }}\" style=\"flex:1; background:#F4ECE3; border:none; border-radius:13px; padding:14px; font-family:'Figtree',sans-serif; font-weight:700; font-size:15px; color:#6F665D; cursor:pointer;\">Cancel<\u002Fbutton>\n          <button onclick=\"{{ confirmBooking }}\" disabled=\"{{ confirmDisabled }}\" style=\"{{ confirmStyle }}\"><span class=\"material-symbols-rounded\" style=\"font-size:19px;\">{{ confirmIcon }}<\u002Fspan>{{ confirmLabel }}<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===================== EDIT EVENT ===================== -->\n  <sc-if value=\"{{ editOpen }}\" hint-placeholder-val=\"\">\n    <div style=\"position:fixed; inset:0; background:rgba(46,40,35,.42); backdrop-filter:blur(3px); display:flex; align-items:center; justify-content:center; padding:24px; z-index:55; animation:omFade .18s ease;\">\n      <div style=\"width:100%; max-width:460px; background:#fff; border-radius:24px; box-shadow:0 24px 60px rgba(46,40,35,.28); overflow:hidden; animation:omPop .22s cubic-bezier(.2,.8,.3,1);\">\n        <div style=\"display:flex; align-items:center; justify-content:space-between; padding:22px 24px 16px;\">\n          <h2 style=\"font-size:20px; font-weight:800; letter-spacing:-.01em; margin:0;\">Edit booking<\u002Fh2>\n          <button onclick=\"{{ closeEdit }}\" style=\"background:#F4ECE3; border:none; width:34px; height:34px; border-radius:10px; color:#6F665D; cursor:pointer; display:flex; align-items:center; justify-content:center;\"><span class=\"material-symbols-rounded\" style=\"font-size:20px;\">close<\u002Fspan><\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"padding:0 24px;\">\n          <label style=\"display:block; font-size:13px; font-weight:700; color:#6F665D; margin-bottom:7px;\">Booking name<\u002Flabel>\n          <input value=\"{{ editForm.title }}\" onchange=\"{{ setEditTitle }}\" placeholder=\"Booking name\" style=\"width:100%; border:1.5px solid #EAE0D5; border-radius:13px; padding:13px 14px; font-family:'Figtree',sans-serif; font-size:15px; color:#2E2823; background:#FFFDFB;\" style-focus=\"{{ inputFocus }}\">\n\n          <label style=\"display:block; font-size:13px; font-weight:700; color:#6F665D; margin:18px 0 7px;\">Day<\u002Flabel>\n          <div style=\"display:flex; gap:8px;\">\n            <sc-for list=\"{{ editDayOptions }}\" as=\"d\" hint-placeholder-count=\"5\">\n              <button onclick=\"{{ d.onClick }}\" style=\"{{ d.style }}\">\n                <span style=\"font-size:11px; font-weight:600; opacity:.8;\">{{ d.label }}<\u002Fspan>\n                <span style=\"font-size:16px; font-weight:800;\">{{ d.date }}<\u002Fspan>\n              <\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <div style=\"display:flex; gap:12px; margin-top:18px;\">\n            <div style=\"flex:1;\">\n              <label style=\"display:block; font-size:13px; font-weight:700; color:#6F665D; margin-bottom:7px;\">Start<\u002Flabel>\n              <input type=\"time\" value=\"{{ editForm.start }}\" onchange=\"{{ setEditStart }}\" style=\"width:100%; border:1.5px solid #EAE0D5; border-radius:13px; padding:12px 14px; font-family:'Figtree',sans-serif; font-size:15px; color:#2E2823; background:#FFFDFB;\" style-focus=\"{{ inputFocus }}\">\n            <\u002Fdiv>\n            <div style=\"flex:1;\">\n              <label style=\"display:block; font-size:13px; font-weight:700; color:#6F665D; margin-bottom:7px;\">End<\u002Flabel>\n              <input type=\"time\" value=\"{{ editForm.end }}\" onchange=\"{{ setEditEnd }}\" style=\"width:100%; border:1.5px solid #EAE0D5; border-radius:13px; padding:12px 14px; font-family:'Figtree',sans-serif; font-size:15px; color:#2E2823; background:#FFFDFB;\" style-focus=\"{{ inputFocus }}\">\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <sc-if value=\"{{ editShowConflict }}\" hint-placeholder-val=\"\">\n            <div style=\"display:flex; gap:12px; background:#FBE9E6; border:1px solid #F2C9C2; border-radius:14px; padding:14px; margin-top:18px;\">\n              <span class=\"material-symbols-rounded\" style=\"font-size:22px; color:#D85C4E; flex-shrink:0;\">error<\u002Fspan>\n              <div>\n                <div style=\"font-weight:800; font-size:14.5px; color:#B23F33;\">Scheduling conflict<\u002Fdiv>\n                <div style=\"font-size:13.5px; color:#9C5249; margin-top:3px; line-height:1.5;\">Overlaps <strong>{{ editConflictTitle }}<\u002Fstrong> ({{ editConflictTime }}) {{ editConflictSource }}. Pick another time to save.<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n        <div style=\"display:flex; gap:10px; padding:20px 24px 24px; margin-top:8px;\">\n          <button onclick=\"{{ deleteFromEdit }}\" style=\"display:flex; align-items:center; gap:7px; background:#fff; border:1.5px solid #F2C9C2; color:#D85C4E; border-radius:13px; padding:14px 16px; font-family:'Figtree',sans-serif; font-weight:700; font-size:14.5px; cursor:pointer;\"><span class=\"material-symbols-rounded\" style=\"font-size:19px;\">delete<\u002Fspan>Delete<\u002Fbutton>\n          <div style=\"flex:1;\"><\u002Fdiv>\n          <button onclick=\"{{ closeEdit }}\" style=\"background:#F4ECE3; border:none; border-radius:13px; padding:14px 18px; font-family:'Figtree',sans-serif; font-weight:700; font-size:14.5px; color:#6F665D; cursor:pointer;\">Cancel<\u002Fbutton>\n          <button onclick=\"{{ saveEdit }}\" disabled=\"{{ editSaveDisabled }}\" style=\"{{ editSaveStyle }}\"><span class=\"material-symbols-rounded\" style=\"font-size:19px;\">check<\u002Fspan>Save<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===================== CANCEL CONFIRM ===================== -->\n  <sc-if value=\"{{ cancelTarget }}\" hint-placeholder-val=\"\">\n    <div style=\"position:fixed; inset:0; background:rgba(46,40,35,.42); backdrop-filter:blur(3px); display:flex; align-items:center; justify-content:center; padding:24px; z-index:60; animation:omFade .18s ease;\">\n      <div style=\"width:100%; max-width:400px; background:#fff; border-radius:24px; box-shadow:0 24px 60px rgba(46,40,35,.28); padding:26px; text-align:center; animation:omPop .22s cubic-bezier(.2,.8,.3,1);\">\n        <div style=\"width:60px; height:60px; border-radius:50%; background:#FBE9E6; display:flex; align-items:center; justify-content:center; margin:0 auto 16px;\"><span class=\"material-symbols-rounded\" style=\"font-size:32px; color:#D85C4E;\">delete<\u002Fspan><\u002Fdiv>\n        <h2 style=\"font-size:20px; font-weight:800; letter-spacing:-.01em; margin:0 0 8px;\">Cancel this booking?<\u002Fh2>\n        <p style=\"font-size:14.5px; color:#6F665D; line-height:1.55; margin:0 0 6px;\">This will permanently remove your booking. This can't be undone.<\u002Fp>\n        <div style=\"background:#FBF6F0; border:1px solid #EFE7DD; border-radius:13px; padding:13px 16px; margin:16px 0 22px; text-align:left;\">\n          <div style=\"font-weight:700; font-size:15px;\">{{ cancelTarget.title }}<\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap:6px; font-size:13.5px; color:#9B9189; margin-top:3px;\"><span class=\"material-symbols-rounded\" style=\"font-size:16px;\">schedule<\u002Fspan>{{ cancelTarget.dayName }} {{ cancelTarget.dateNum }} · {{ cancelTarget.timeRange }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; gap:10px;\">\n          <button onclick=\"{{ closeCancel }}\" style=\"flex:1; background:#F4ECE3; border:none; border-radius:13px; padding:14px; font-family:'Figtree',sans-serif; font-weight:700; font-size:15px; color:#6F665D; cursor:pointer;\">Keep it<\u002Fbutton>\n          <button onclick=\"{{ confirmCancel }}\" style=\"flex:1; display:flex; align-items:center; justify-content:center; gap:7px; background:#D85C4E; border:none; border-radius:13px; padding:14px; font-family:'Figtree',sans-serif; font-weight:700; font-size:15px; color:#fff; cursor:pointer; box-shadow:0 6px 16px rgba(216,92,78,.28);\"><span class=\"material-symbols-rounded\" style=\"font-size:19px;\">delete<\u002Fspan>Cancel booking<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===================== TOAST ===================== -->\n  <sc-if value=\"{{ toast }}\" hint-placeholder-val=\"\">\n    <div style=\"position:fixed; bottom:28px; left:50%; transform:translateX(-50%); z-index:80; animation:omToast .25s cubic-bezier(.2,.8,.3,1);\">\n      <div style=\"display:flex; align-items:center; gap:10px; background:#2E2823; color:#fff; padding:13px 20px; border-radius:14px; box-shadow:0 12px 32px rgba(46,40,35,.3); font-size:14.5px; font-weight:600;\">\n        <span class=\"material-symbols-rounded\" style=\"font-size:20px; color:{{ toastColor }};\">{{ toastIcon }}<\u002Fspan>{{ toast }}\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    screen: 'login',\n    bookings: [\n      { id: 1, title: 'Design Review', day: 1, start: '10:00', end: '11:00' },\n      { id: 2, title: '1:1 with Sam', day: 1, start: '14:00', end: '14:30' },\n      { id: 3, title: 'Sprint Planning', day: 3, start: '09:00', end: '10:30' },\n      { id: 4, title: 'Client Demo', day: 4, start: '15:00', end: '16:00' },\n    ],\n    googleEvents: [\n      { id: 'g1', title: 'Dentist', day: 1, start: '16:00', end: '17:00' },\n      { id: 'g2', title: 'Team Lunch', day: 2, start: '12:00', end: '13:00' },\n      { id: 'g3', title: 'Focus block', day: 3, start: '13:00', end: '15:00' },\n    ],\n    googleConnected: true,\n    authMode: 'login',\n    authForm: { name: '', email: '', password: '' },\n    modalOpen: false,\n    form: { title: 'Roadmap Sync', day: 1, start: '10:30', end: '11:30' },\n    dashView: 'populated',\n    toast: null,\n  };\n\n  dayNames = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];\n  dayDates = [22, 23, 24, 25, 26, 27, 28];\n  todayIndex = 2;\n  START_HOUR = 8;\n  HOURS = 10;\n  HOUR_H = 56;\n\n  toMin(t) { const p = t.split(':').map(Number); return p[0] * 60 + p[1]; }\n  fmt(t) { const p = t.split(':').map(Number); const ap = p[0] < 12 ? 'AM' : 'PM'; const hh = ((p[0] + 11) % 12) + 1; return hh + (p[1] ? ':' + String(p[1]).padStart(2, '0') : '') + ' ' + ap; }\n  dur(s, e) { let m = this.toMin(e) - this.toMin(s); if (m <= 0) return ''; const h = Math.floor(m / 60), mm = m % 60; return (h ? h + 'h' : '') + (mm ? ' ' + mm + 'm' : ''); }\n\n  findConflict(day, start, end, excludeId) {\n    const s = this.toMin(start), e = this.toMin(end);\n    if (!(s < e)) return null;\n    for (const b of this.state.bookings) {\n      if (b.id === excludeId) continue;\n      if (b.day === day) { const bs = this.toMin(b.start), be = this.toMin(b.end); if (s < be && bs < e) return { title: b.title, source: 'system', time: this.fmt(b.start) + ' – ' + this.fmt(b.end) }; }\n    }\n    if (this.state.googleConnected) {\n      for (const g of this.state.googleEvents) {\n        if (g.day === day) { const gs = this.toMin(g.start
